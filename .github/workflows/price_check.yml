name: Korea Trip Price Check

on:
  schedule:
    # 7 AM UTC = 2 PM Vietnam time (UTC+7)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Adds a manual "Run workflow" button in the GitHub Actions UI

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r price_tracker/requirements.txt

      - name: Run price tracker
        working-directory: price_tracker
        run: python tracker.py
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated price history
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add price_tracker/prices.db
          git diff --staged --quiet || (
            git commit -m "chore: price history $(date -u +%Y-%m-%d)" &&
            git push
          )
